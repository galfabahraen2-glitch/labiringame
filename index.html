<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fullscreen viewport — critical for proper layout on ALL devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Mobile PWA meta -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0b1a" />
    <!-- SEO -->
    <title>Labyrinth Quest — Perjalanan Jiwa dalam Labirin Kehidupan</title>
    <meta name="description" content="Game labirin 3D kooperatif dengan filosofi perjalanan hidup. Hadapi godaan, kumpulkan bekal, dan raih Istana Kristal." />
    <!-- Preload Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* Critical: prevent FOUC and ensure true fullscreen from first paint */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #0b0b1a;
      }
      body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #0b0b1a;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
      }
      #root {
        width: 100%; height: 100%;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
